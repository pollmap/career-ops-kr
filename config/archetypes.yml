# 🔶 USER 레이어 — 찬희 금융 도메인 확정본
#
# Archetype classifier keyword maps for the Korean finance/fintech/blockchain
# job-hunt pipeline.  Each archetype defines keywords at three weights
# (strong=3, medium=2, weak=1) plus organization name hints that add a small
# bonus on match.  The classifier sums weighted hits per archetype and uses
# ``tiebreak_priority`` to break ties (earlier = higher priority).
#
# This file is the USER layer — system updates must NOT overwrite it.
# To create a new domain (e.g. healthcare, public sector), copy
# templates/archetypes.example.yml and edit.

version: 1
domain: finance_kr
description: 한국 금융/핀테크/블록체인 직무 분류 (찬희 확정본)

tiebreak_priority:
  - BLOCKCHAIN
  - DIGITAL_ASSET
  - CERTIFICATION
  - PUBLIC_FINANCE
  - RESEARCH
  - FINTECH_PRODUCT
  - FINANCIAL_IT
  - UNKNOWN

