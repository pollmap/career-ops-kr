        - 블록체인부
        - 블록체인스크럼
        - 블록체인 스크럼
      medium:
        - DID
        - 온체인
        - 이더리움
        - 솔라나
        - 디파이
        - NFT
        - 암호화폐
        - 크립토
      weak:
        - 디지털
        - 분산원장
    org_patterns:
      - Lambda256
      - Hashed
      - 체인파트너스

