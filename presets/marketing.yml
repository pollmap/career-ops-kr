      include: ["마케팅", "인턴"]
      exclude: []

archetypes:
  PERFORMANCE_MARKETING:
    label: "퍼포먼스 마케터"
    keywords: ["퍼포먼스", "퍼포먼스 마케팅", "Meta Ads", "Google Ads", "광고 운영"]
  CONTENT_MARKETING:
    label: "콘텐츠 마케터"
    keywords: ["콘텐츠 마케팅", "카피라이팅", "블로그", "SEO"]
  SOCIAL_MEDIA:
    label: "SNS / 소셜미디어 매니저"
    keywords: ["SNS", "인스타그램", "틱톡", "유튜브", "커뮤니티"]
  BRAND_MANAGEMENT:
    label: "브랜드 매니저 / BM"
    keywords: ["브랜드", "BM", "Brand Manager", "브랜드 마케팅"]
  PR:
    label: "PR / 홍보"
    keywords: ["PR", "홍보", "언론", "미디어"]
  GROWTH_HACKING:
    label: "그로스 해커"
    keywords: ["그로스", "Growth Hacking", "리텐션", "AARRR", "데이터 드리븐"]
  CRM:
    label: "CRM 마케터"
    keywords: ["CRM", "리텐션", "푸시", "이메일 마케팅"]

profile_template:
  target_industries:
    - "IT 서비스 / 플랫폼"
    - "커머스 / D2C 브랜드"
    - "에이전시 (디지털/퍼포먼스)"
    - "스타트업 인하우스 마케팅팀"
  default_strengths:
    - "GA4 + Meta Ads 운영 경험"
    - "콘텐츠 기획 + 카피라이팅"
    - "지표 기반 A/B 실험"
    - "인스타그램 / 커뮤니티 운영"
  default_constraints:
    - "대형 브랜드 실무 경력 없음"
    - "정식 마케팅 학위 없음 (해당 시)"
  suggested_certifications:
    - "GA4 (Google Analytics Individual Qualification)"
    - "Meta Blueprint"
    - "Google Ads 자격 인증"
    - "YouTube 크리에이터 인증"
    - "소셜미디어 마케팅 전문가"
