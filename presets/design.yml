# 🟪 PRESET — 디자이너 (UX/UI/BX/그래픽/프로덕트)
# career-ops-kr domain preset
# 인코딩: UTF-8

preset_id: design
label_ko: "디자이너"
label_en: "Designer"
description: >
  UX/UI, BX/브랜드, 그래픽, 프로덕트, 모션, 일러스트 등 디자인 직군 전반.
  디자인정글/노트폴리오 등 포트폴리오 중심 포털 기반. Figma·Sketch·XD
  툴 스택과 프로세스 키워드 가점 체계 내장.
target_audience: "디자인과 학부생, 신입 디자이너, 전업 준비 프리랜서 디자이너"

qualifier_rules:
  negative_patterns:
    - id: "neg_senior_only"
      pattern: "(시니어|Senior|리드|팀장급)\\s*(이상|필수)"
      weight: -90
      reason: "시니어/리드 전용"
      action: "reject"
    - id: "neg_experience_years"
      pattern: "(경력|경험)\\s*(3|5|7|10)\\s*년\\s*이상"
      weight: -60
      reason: "3년+ 경력 요구"
      action: "warn"
    - id: "neg_agency_crunch"
      pattern: "(야근\\s*필수|주\\s*6일|크런치)"
      weight: -70
      reason: "야근/크런치"
      action: "warn"
    - id: "neg_low_pay_internship"
      pattern: "(무급\\s*인턴|열정페이|포트폴리오\\s*목적)"
      weight: -100
      reason: "무급/열정페이"
      action: "reject"
    - id: "neg_sales"
      pattern: "(영업|고객\\s*응대\\s*우선|클라이언트\\s*미팅\\s*주\\s*업무)"
      weight: -50
      reason: "영업 중심"
      action: "warn"
  positive_patterns:
    - id: "pos_figma"
      pattern: "(Figma|피그마)"
      weight: 70
      reason: "Figma 사용"
    - id: "pos_sketch_xd"
      pattern: "(Sketch|Adobe\\s*XD|XD)"
      weight: 40
      reason: "Sketch/XD"
    - id: "pos_adobe_suite"
      pattern: "(Photoshop|Illustrator|After\\s*Effects|InDesign)"
      weight: 50
      reason: "Adobe Creative Suite"
    - id: "pos_prototyping"
      pattern: "(프로토타입|프로토타이핑|와이어프레임|인터랙션)"
      weight: 60
      reason: "프로토타이핑"
    - id: "pos_design_system"
      pattern: "(디자인\\s*시스템|Design\\s*System|토큰|컴포넌트\\s*체계)"
      weight: 70
      reason: "디자인 시스템"
    - id: "pos_newbie"
      pattern: "(신입|주니어|경력\\s*무관|포트폴리오\\s*중심)"
      weight: 70
      reason: "신입 가능"
    - id: "pos_remote"
      pattern: "(재택|원격|하이브리드)"
      weight: 40
      reason: "원격 근무"
    - id: "pos_user_research"
      pattern: "(사용자\\s*리서치|UT|유저\\s*인터뷰|정성\\s*조사)"
      weight: 50
      reason: "사용자 리서치"
  numeric_rules:
    min_semester_completed: 2
    max_gpa_required: 3.0
    age_range:
      min: 19
      max: 35
    max_years_experience_required: 2

scoring_weights:
  dimensions:
    role_fit: 0.20
    eligibility_match: 0.20
    compensation: 0.10
    location: 0.10
    growth: 0.10
    brand: 0.10
    portfolio_usefulness: 0.10
    schedule_conflict: 0.05
    deadline_urgency: 0.03
    hitl_discretion: 0.02
  modifiers:
    role_fit:
      - keyword: "UX|UI|프로덕트|BX|브랜드"
        bonus: 10
      - keyword: "단순 편집|타이핑|CS"
        bonus: -15
    portfolio_usefulness:
      - keyword: "노트폴리오|Behance|Dribbble|포트폴리오 사이트"
        bonus: 12
    brand:
      - keyword: "네이버|카카오|토스|당근|배민|우아한|무신사"
        bonus: 10

portals:
  - name: "디자인정글"
    key: "designjungle"
    url: "https://www.jungle.co.kr/magazine/jobs"  # TODO: verify jobs board path
    backend: "playwright"
    tier: 1
    login_required: false
    enabled: true
    filters:
      include: ["UX", "UI", "그래픽", "브랜드", "신입"]
      exclude: ["영업"]
  - name: "디자이너스"
    key: "designersk"
    url: "https://www.designersk.co.kr/recruit"  # TODO: verify exact URL
    backend: "playwright"
    tier: 2
    login_required: false
    enabled: false  # URL unverified — keep disabled by default
    filters:
      include: ["디자이너", "UX", "UI"]
      exclude: []
  - name: "라우드소싱"
    key: "loud"
    url: "https://www.loud.kr"
    backend: "playwright"
    tier: 3
    login_required: false
    enabled: true
    filters:
      include: ["디자인", "프로젝트", "외주"]
      exclude: []
  - name: "노트폴리오"
    key: "notefolio"
    url: "https://notefolio.net/jobs"
    backend: "playwright"
    tier: 1
    login_required: false
    enabled: true
    filters:
      include: ["UX", "UI", "프로덕트", "그래픽", "브랜드"]
      exclude: []
  - name: "원티드 (디자인)"
    key: "wanted_design"
    url: "https://www.wanted.co.kr/wdlist/511"  # 디자인 카테고리
    backend: "api"
    tier: 1
    login_required: false
    enabled: true
    filters:
      include: ["UX", "UI", "프로덕트", "브랜드"]
      exclude: ["영업"]
  - name: "링커리어 (디자인)"
    key: "linkareer_design"
    url: "https://linkareer.com/list/recruit"
    backend: "playwright"
    tier: 2
    login_required: false
    enabled: true
    filters:
      include: ["디자인", "UX", "UI", "브랜드", "인턴"]
      exclude: ["생산직"]
  - name: "캐시슬라이드 (디자인 포지션)"
    key: "cashslide_design"
    url: "https://www.saramin.co.kr"  # TODO: consolidated 사람인 디자인 카테고리
    backend: "playwright"
    tier: 4
    login_required: false
    enabled: false
    filters:
      include: ["디자인"]
      exclude: []

archetypes:
  UX_DESIGN:
    label: "UX 디자이너"
    keywords: ["UX", "사용자 경험", "User Experience", "사용자 리서치", "IA"]
  UI_DESIGN:
    label: "UI 디자이너"
    keywords: ["UI", "User Interface", "화면 설계", "시각 디자인"]
  BX_BRAND:
    label: "BX / 브랜드 디자이너"
    keywords: ["BX", "브랜드 디자인", "브랜드 아이덴티티", "CI", "BI"]
  GRAPHIC:
    label: "그래픽 디자이너"
    keywords: ["그래픽", "편집", "인쇄", "포스터", "에디토리얼"]
  PRODUCT_DESIGN:
    label: "프로덕트 디자이너"
    keywords: ["프로덕트 디자인", "Product Designer", "디자인 시스템"]
  MOTION:
    label: "모션 그래픽 디자이너"
    keywords: ["모션", "Motion Graphic", "애프터이펙트", "AE", "2D 애니메이션"]
  ILLUSTRATION:
    label: "일러스트레이터"
    keywords: ["일러스트", "Illustration", "캐릭터", "굿즈"]

profile_template:
  target_industries:
    - "IT 서비스 / 플랫폼"
    - "브랜드 에이전시"
    - "스타트업 인하우스 디자인팀"
    - "에듀테크 / 커머스"
  default_strengths:
    - "Figma 프로토타이핑 실전"
    - "사용자 리서치 + 인터뷰 경험"
    - "디자인 시스템 운영 감각"
    - "협업 문화 (PM/FE와의 핸드오프)"
  default_constraints:
    - "대형 브랜드 레퍼런스 부족"
    - "정식 디자인 학위 없음 (해당 시)"
  suggested_certifications:
    - "GTQ 1급 (그래픽 기술자격)"
    - "컬러리스트 산업기사"
    - "시각디자인 산업기사"
