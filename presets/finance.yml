archetypes:
  BLOCKCHAIN:
    label: "블록체인 / 디지털자산"
    keywords: ["블록체인", "Web3", "크립토", "DeFi", "NFT", "토큰", "체인"]
  DIGITAL_ASSET:
    label: "디지털자산 운용"
    keywords: ["디지털자산", "가상자산", "STO", "토큰증권"]
  FINANCIAL_IT:
    label: "금융 IT / 디지털 혁신"
    keywords: ["디지털 혁신", "DT", "금융 IT", "MyData", "오픈뱅킹"]
  RESEARCH:
    label: "리서치 / 애널리스트"
    keywords: ["리서치", "애널리스트", "기업분석", "가치투자", "리포트"]
  FINTECH_PRODUCT:
    label: "핀테크 PM / 프로덕트"
    keywords: ["PM", "프로덕트", "서비스 기획", "UX"]
  PUBLIC_FINANCE:
    label: "공공금융 / 한국은행"
    keywords: ["한국은행", "KDIC", "KOFIA", "예금보험공사", "공공"]
  CERTIFICATION:
    label: "자격증 트랙"
    keywords: ["투자자산운용사", "증권투자상담사", "금융투자분석사"]

profile_template:
  target_industries:
    - "금융사 디지털 부문"
    - "핀테크"
    - "블록체인"
    - "공공금융"
    - "데이터/퀀트"
  default_strengths:
    - "금융 × AI × 블록체인 교차 역량"
    - "에이전틱 코딩 실전 (Claude Code + MCP)"
    - "가치투자 리서치 산출 능력"
    - "Python + SQL 실전"
  default_constraints:
    - "비전공 (경영학)"
    - "정규직 경력 없음"
  suggested_certifications:
    - "ADsP"
    - "SQLD"
    - "금융투자분석사"
    - "투자자산운용사"
    - "한국사능력검정시험"
