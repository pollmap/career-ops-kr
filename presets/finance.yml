# 🟦 PRESET — 금융 / 핀테크 / 블록체인
# career-ops-kr domain preset (Chanhee's confirmed MVP configuration)
# 인코딩: UTF-8 (no BOM)
# 최종 갱신: 2026-04-11

preset_id: finance
label_ko: "금융 / 핀테크 / 블록체인"
label_en: "Finance / Fintech / Blockchain"
description: >
  한국 금융사(은행/증권/보험) 디지털 부문, 핀테크 스타트업, 블록체인/디지털자산,
  공공금융(한국은행/KDIC/KOFIA), 리서치/퀀트 직무를 위한 프리셋.
  Chanhee's Sprint 1 확정본 — 9개 포털, CUFA/Luxon AI 포트폴리오 가점 최적화.
target_audience: "금융권 디지털 인턴/신입, 리서치 어시스턴트, 핀테크 개발/PM 지망생"

qualifier_rules:
  negative_patterns:
    - id: "neg_graduate_only"
      pattern: "(졸업자|기졸업자|졸업\\s*후)"
      weight: -100
      reason: "졸업자 전용 공고"
      action: "reject"
    - id: "neg_graduation_candidate"
      pattern: "(졸업\\s*예정자|졸업예정)"
      weight: -80
      reason: "졸업예정자 조건"
      action: "reject"
    - id: "neg_ict_major_required"
      pattern: "(전산|정보통신|컴퓨터공학|소프트웨어공학|전자공학)\\s*(전공\\s*필수|전공\\s*자|학사\\s*이상\\s*필수)"
      weight: -90
      reason: "IT 전공 필수"
      action: "reject"
    - id: "neg_gpa_high"
      pattern: "(학점|평점|GPA)\\s*(3\\.[5-9]|4\\.[0-5])\\s*(이상|\\+)"
      weight: -70
      reason: "학점 3.5+ 요구"
      action: "warn"
    - id: "neg_experience_years"
      pattern: "(경력|경험)\\s*(3|5|7|10)\\s*년\\s*이상"
      weight: -60
      reason: "3년+ 경력 요구"
      action: "warn"
    - id: "neg_certification_required"
      pattern: "(투자자산운용사|CFA|FRM|AICPA)\\s*(필수|보유자)"
      weight: -50
      reason: "자격증 필수"
      action: "warn"
    - id: "neg_sales_role"
      pattern: "(영업|세일즈|텔레마케팅|고객\\s*유치|신규\\s*개척)"
      weight: -90
      reason: "영업/세일즈 포지션"
      action: "reject"
    - id: "neg_field_sales"
      pattern: "(지점\\s*영업|방문\\s*판매|외근)"
      weight: -80
      reason: "외근/지점영업"
      action: "reject"
  positive_patterns:
    - id: "pos_no_edu_limit"
      pattern: "(학력\\s*무관|학력\\s*제한\\s*없음)"
      weight: 80
      reason: "학력 무관"
    - id: "pos_no_major_limit"
      pattern: "(전공\\s*무관|전공\\s*불문|비전공\\s*지원\\s*가능)"
      weight: 70
      reason: "전공 무관"
    - id: "pos_leave_ok"
      pattern: "(휴학생\\s*가능|휴학\\s*중\\s*지원|재학생/휴학생)"
      weight: 90
      reason: "휴학생 명시 가능"
    - id: "pos_newbie"
      pattern: "(신입|경력\\s*무관|실무\\s*경험\\s*없어도)"
      weight: 60
      reason: "신입/경력 무관"
    - id: "pos_training_card"
      pattern: "(내일배움카드|국비\\s*지원|K-digital)"
      weight: 50
      reason: "내일배움카드 지원 가능"
    - id: "pos_python"
      pattern: "(Python|파이썬)"
      weight: 40
      reason: "Python 요구"
    - id: "pos_sql"
      pattern: "(SQL|쿼리|데이터베이스)"
      weight: 30
      reason: "SQL 요구"
    - id: "pos_ai_agent"
      pattern: "(AI\\s*에이전트|LLM|생성형\\s*AI|Claude|GPT|MCP)"
      weight: 80
      reason: "AI 에이전트 관련"
    - id: "pos_fintech_blockchain"
      pattern: "(핀테크|블록체인|크립토|Web3|DeFi)"
      weight: 70
      reason: "핀테크/블록체인 타겟 산업"
    - id: "pos_research"
      pattern: "(리서치|리서처|애널리스트|기업\\s*분석|가치\\s*투자)"
      weight: 60
      reason: "리서치 포지션"
    - id: "pos_remote"
      pattern: "(재택|원격|리모트|하이브리드)"
      weight: 30
      reason: "원격 가능"
  numeric_rules:
    min_semester_completed: 2
    max_gpa_required: 3.0
    age_range:
      min: 20
      max: 29
    max_years_experience_required: 2

scoring_weights:
  dimensions:
    role_fit: 0.20
    eligibility_match: 0.20
    compensation: 0.10
    location: 0.10
    growth: 0.10
    brand: 0.10
    portfolio_usefulness: 0.10
    schedule_conflict: 0.05
    deadline_urgency: 0.03
    hitl_discretion: 0.02
  modifiers:
    role_fit:
      - keyword: "AI 리서치|퀀트|데이터 분석"
        bonus: 10
      - keyword: "단순 사무|영업|CS"
        bonus: -15
    portfolio_usefulness:
      - keyword: "MCP|에이전트|LLM|가치투자|CUFA"
        bonus: 10
    brand:
      - keyword: "신한|키움|삼성|카카오|네이버|토스"
        bonus: 10

portals:
  - name: "링커리어"
    key: "linkareer"
    url: "https://linkareer.com/list/recruit"
    backend: "playwright"
    tier: 1
    login_required: false
    enabled: true
    filters:
      include: ["금융", "IT", "데이터", "핀테크", "블록체인", "AI", "디지털", "인턴", "체험형"]
      exclude: ["영업", "텔레마케팅", "생산직"]
  - name: "잡알리오"
    key: "jobaliio"
    url: "https://job.alio.go.kr/recruit.do"
