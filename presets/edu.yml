archetypes:
  K12_TEACHING:
    label: "초·중·고 교사 / 기간제"
    keywords: ["초등", "중등", "고등", "기간제 교사", "방과후"]
  UNIVERSITY_TEACHING:
    label: "대학 강사 / 시간강사"
    keywords: ["대학 강사", "시간강사", "겸임", "전임"]
  CORPORATE_TRAINING:
    label: "기업 교육 / HRD"
    keywords: ["HRD", "기업 교육", "임직원 교육", "리더십"]
  EDTECH:
    label: "에듀테크 / 학습 플랫폼"
