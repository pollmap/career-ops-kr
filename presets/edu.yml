    - "사교육 / 학원"
    - "공공 평생교육"
  default_strengths:
    - "교안/커리큘럼 설계 경험"
    - "학습자 피드백 반영 경험"
    - "LMS / 이러닝 플랫폼 활용"
    - "멘토링/튜터 실무"
  default_constraints:
    - "정식 교원 자격증 없음 (해당 시)"
