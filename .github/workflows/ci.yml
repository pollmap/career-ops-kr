name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Global env: force UTF-8 everywhere so Windows runners don't choke on
# Korean CLI output / source strings (cp949 fallback is fatal on CI).
env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (all extras + dev)
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Lint (ruff format)
        run: uv run ruff format --check .

      - name: Run pytest
        # Playwright + slow tests require browsers / network, skip on CI.
        # Textual tests run because `--all-extras` installs the optional dep.
        run: uv run pytest -q -m "not playwright and not slow"

      - name: Verify package import
        run: uv run python -c "import career_ops_kr; print(career_ops_kr.__version__)"

      - name: Verify CLI entry point
        run: uv run career-ops --help

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (all extras + dev)
        run: uv sync --all-extras --dev

      - name: Mypy
        # Non-blocking for now — strict mypy is a Sprint 5 goal. Flip to
        # required once the remaining 4 errors (playwright_base, wanted,
        # tui/calendar) are resolved.
        run: uv run mypy career_ops_kr
        continue-on-error: true
